name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint (ruff)
        if: success() || failure()
        run: ruff check calendar_splitter/

      - name: Type check (mypy)
        if: success() || failure()
        run: mypy calendar_splitter/

      - name: Test (pytest)
        if: success() || failure()
        run: pytest tests/ -v
